<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>LOVII</title>
<link rel="icon" type="image/svg+xml" href="assets/lovii-icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">

<body>

<div id="splash">
  <div class="splash-visual">
    <img class="splash-logo" src="assets/lovii-logo-light.svg" alt="LOVII">
    <div class="splash-cover"></div>
  </div>
</div>

<div id="app">
  <!-- Header -->
  <header id="app-header">
    <a href="#home" id="app-logo-link"><img id="app-logo" src="assets/lovii-logo-light.svg" alt="LOVII"></a>
    <div class="header-actions">
      <div class="avatar-wrap">
        <svg class="avatar-icon" viewBox="0 0 512 512" fill="none">
          <rect width="512" height="512" rx="80" fill="var(--pink)"/>
          <path d="M160 360c0-50 43-90 96-90s96 40 96 90" stroke="#fff" stroke-width="24" stroke-linecap="round" fill="none"/>
          <circle cx="256" cy="200" r="60" fill="#fff"/>
          <path d="M210 320l-38-44-24 20 62 66 100-106-30-28-70 77z" fill="#fff" transform="translate(0,-15)"/>
        </svg>
        <span class="notif-dot"></span>
      </div>
    </div>
  </header>

  <!-- Content -->
  <main id="app-content"></main>

  <!-- Bottom Nav -->
  <nav id="app-nav">
    <a href="#home" class="nav-item" data-tab="home">
      <svg class="icon"><use href="#i-home"/></svg>
      <span>Главная</span>
    </a>
    <a href="#search" class="nav-item" data-tab="search">
      <svg class="icon"><use href="#i-search"/></svg>
      <span>Поиск</span>
    </a>
    <a href="#orders" class="nav-item" data-tab="orders">
      <svg class="icon"><use href="#i-package"/></svg>
      <span>Заказы</span>
    </a>
    <a href="#profile" class="nav-item" data-tab="profile">
      <svg class="icon"><use href="#i-user"/></svg>
      <span>Профиль</span>
    </a>
  </nav>
</div>
